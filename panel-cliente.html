<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tu panel — Dra. Pérez Álvarez</title>
  <meta name="robots" content="noindex">

  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>

<body>

  <!-- ==================== HEADER ==================== -->
  <header>
    <nav class="container">
      <a href="index.html" class="logo-wrapper" style="text-decoration:none;">
        <img src="img/logo.png" alt="Dra. Silvia Pérez Álvarez" class="logo">
        <span class="logo-wordmark">Dra. Silvia<br>Pérez Álvarez</span>
      </a>
      <button id="logoutBtn" class="btn-nav-cta btn btn-primary" style="background:transparent; color:var(--color-text); border:1px solid var(--color-border);">Cerrar sesión</button>
    </nav>
  </header>

  <!-- ==================== PANEL CLIENTE ==================== -->
  <section class="panel-page">
    <div class="container">
      <span class="eyebrow">TU ÁREA PRIVADA</span>
      <h1 id="saludo">Hola</h1>
      <p class="panel-subtitle">Aquí puedes ver el estado de tu caso, subir documentación y consultar el presupuesto.</p>

      <div id="casosContainer" class="casos-container">
        <p class="panel-loading">Cargando tu información...</p>
      </div>
    </div>
  </section>

  <script>
    const SUPABASE_URL = 'https://wijnmofhphfcnsioyvxw.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_BsBDw028Yev-jqYTPrPL2A_Ol0cAXkk';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const ESTADOS = {
      recibido: { label: 'Recibido', clase: 'estado-recibido' },
      en_revision: { label: 'En revisión', clase: 'estado-revision' },
      presupuesto_enviado: { label: 'Presupuesto enviado', clase: 'estado-presupuesto' },
      finalizado: { label: 'Finalizado', clase: 'estado-finalizado' }
    };

    let currentUser = null;

    async function init() {
      if (typeof window.supabase === 'undefined') {
        document.getElementById('casosContainer').innerHTML =
          '<p class="panel-empty">No se ha podido cargar el sistema. Recarga la página o pruébalo en otro navegador.</p>';
        return;
      }

      try {
        await cargarPanel();
      } catch (err) {
        console.error(err);
        document.getElementById('casosContainer').innerHTML =
          '<p class="panel-empty">Ha ocurrido un error al cargar tu información. Recarga la página; si persiste, contacta con la clínica.</p>';
      }
    }

    async function cargarPanel() {
      const { data: { session } } = await sb.auth.getSession();

      if (!session) {
        window.location.href = 'login.html';
        return;
      }

      const { data: profile } = await sb
        .from('profiles')
        .select('*')
        .eq('id', session.user.id)
        .single();

      if (!profile || profile.role !== 'client') {
        window.location.href = profile && profile.role === 'admin' ? 'panel-admin.html' : 'login.html';
        return;
      }

      currentUser = session.user;
      document.getElementById('saludo').textContent = 'Hola, ' + (profile.full_name || profile.email);

      await cargarCasos();
    }

    async function cargarCasos() {
      const container = document.getElementById('casosContainer');
      const { data: casos, error } = await sb
        .from('casos')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        container.innerHTML = '<p class="panel-empty">No se ha podido cargar tu información. Inténtalo de nuevo más tarde.</p>';
        return;
      }

      if (!casos || casos.length === 0) {
        container.innerHTML = '<p class="panel-empty">Todavía no tienes ningún caso abierto. Si has solicitado una valoración recientemente, lo verás aquí en cuanto se active.</p>';
        return;
      }

      container.innerHTML = '';
      for (const caso of casos) {
        const card = await renderCaso(caso);
        container.appendChild(card);
      }
    }

    async function renderCaso(caso) {
      const estado = ESTADOS[caso.estado] || { label: caso.estado, clase: '' };
      const fecha = new Date(caso.created_at).toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' });

      const card = document.createElement('div');
      card.className = 'caso-card';
      card.innerHTML = `
        <div class="caso-card-header">
          <div>
            <h3>${escapeHtml(caso.tipo)}</h3>
            <p class="caso-fecha">Solicitado el ${fecha}</p>
          </div>
          <span class="estado-badge ${estado.clase}">${estado.label}</span>
        </div>
        ${caso.descripcion ? `<p class="caso-descripcion">${escapeHtml(caso.descripcion)}</p>` : ''}

        <div class="caso-section">
          <h4>Documentación</h4>
          <ul class="documentos-list" id="docs-${caso.id}"><li class="panel-loading-small">Cargando...</li></ul>
          <form class="upload-row" data-caso="${caso.id}">
            <input type="file" required>
            <button type="submit" class="btn btn-primary">Subir documento</button>
          </form>
        </div>

        <div class="caso-section">
          <h4>Presupuesto</h4>
          <div class="presupuestos-list" id="presu-${caso.id}"><p class="panel-loading-small">Cargando...</p></div>
        </div>
      `;

      cargarDocumentos(caso.id);
      cargarPresupuestos(caso.id);

      card.querySelector('.upload-row').addEventListener('submit', function (e) {
        e.preventDefault();
        subirDocumento(caso.id, this);
      });

      return card;
    }

    async function cargarDocumentos(casoId) {
      const list = document.getElementById('docs-' + casoId);
      const { data: docs, error } = await sb
        .from('documentos')
        .select('*')
        .eq('caso_id', casoId)
        .order('created_at', { ascending: false });

      if (error || !docs || docs.length === 0) {
        list.innerHTML = '<li class="panel-empty-small">Aún no hay documentos.</li>';
        return;
      }

      list.innerHTML = '';
      for (const doc of docs) {
        const { data: signed } = await sb.storage.from('documentos').createSignedUrl(doc.storage_path, 300);
        const li = document.createElement('li');
        const quien = doc.subido_por === 'admin' ? ' (subido por la clínica)' : '';
        li.innerHTML = signed
          ? `<a href="${signed.signedUrl}" target="_blank" rel="noopener">${escapeHtml(doc.nombre_archivo)}</a>${quien}`
          : `${escapeHtml(doc.nombre_archivo)}${quien}`;
        list.appendChild(li);
      }
    }

    async function cargarPresupuestos(casoId) {
      const container = document.getElementById('presu-' + casoId);
      const { data: presus, error } = await sb
        .from('presupuestos')
        .select('*')
        .eq('caso_id', casoId)
        .neq('estado', 'borrador')
        .order('created_at', { ascending: false });

      if (error || !presus || presus.length === 0) {
        container.innerHTML = '<p class="panel-empty-small">Todavía no hay un presupuesto disponible.</p>';
        return;
      }

      container.innerHTML = '';
      for (const p of presus) {
        const row = document.createElement('div');
        row.className = 'presupuesto-row';
        let pdfLink = '';
        if (p.pdf_path) {
          const { data: signed } = await sb.storage.from('documentos').createSignedUrl(p.pdf_path, 300);
          if (signed) pdfLink = `<a href="${signed.signedUrl}" target="_blank" rel="noopener">Descargar PDF</a>`;
        }
        row.innerHTML = `
          <span>${escapeHtml(p.concepto)}</span>
          <strong>${Number(p.importe).toLocaleString('es-ES', { minimumFractionDigits: 2 })} €</strong>
          ${pdfLink}
        `;
        container.appendChild(row);
      }
    }

    async function subirDocumento(casoId, form) {
      const input = form.querySelector('input[type="file"]');
      const file = input.files[0];
      if (!file) return;

      const button = form.querySelector('button');
      button.disabled = true;
      button.textContent = 'Subiendo...';

      const path = `${currentUser.id}/${Date.now()}_${file.name}`;
      const { error: uploadError } = await sb.storage.from('documentos').upload(path, file);

      if (uploadError) {
        alert('No se pudo subir el documento. Inténtalo de nuevo.');
        button.disabled = false;
        button.textContent = 'Subir documento';
        return;
      }

      await sb.from('documentos').insert({
        caso_id: casoId,
        cliente_id: currentUser.id,
        nombre_archivo: file.name,
        storage_path: path,
        subido_por: 'cliente'
      });

      form.reset();
      button.disabled = false;
      button.textContent = 'Subir documento';
      cargarDocumentos(casoId);
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    document.getElementById('logoutBtn').addEventListener('click', async function () {
      await sb.auth.signOut();
      window.location.href = 'login.html';
    });

    init();
  </script>

</body>
</html>
